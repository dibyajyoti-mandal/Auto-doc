name: Docs Sync Dispatcher

on:
  workflow_call:
    inputs:
      repo_name:
        required: true
        type: string
      pr_number:
        required: true
        type: string
      pr_title:
        required: true
        type: string
    secrets:
      BOT_TOKEN:
        required: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Auto-doc
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_TOKEN }}

      - name: Fetch PR diff
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          REPO: ${{ inputs.repo_name }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          curl -s \
            -H "Authorization: Bearer $BOT_TOKEN" \
            -H "Accept: application/vnd.github.v3.diff" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER" \
            > diff.txt
          echo "Diff fetched. Lines: $(wc -l < diff.txt)"

      - name: Build metadata.json
        env:
          REPO: ${{ inputs.repo_name }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PR_TITLE: ${{ inputs.pr_title }}
        run: |
          DIFF_CONTENT=$(cat diff.txt | python3 -c "
          import sys, json
          print(json.dumps(sys.stdin.read()))
          ")
          echo "{
            \"repo\": \"$REPO\",
            \"pr_number\": \"$PR_NUMBER\",
            \"pr_title\": \"$PR_TITLE\",
            \"diff\": $DIFF_CONTENT
          }" > metadata.json
          echo "=== metadata.json preview ==="
          cat metadata.json | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print('repo:', d['repo'])
          print('pr_number:', d['pr_number'])
          print('pr_title:', d['pr_title'])
          print('diff length (chars):', len(d['diff']))
          "
