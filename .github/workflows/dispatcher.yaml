name: Docs Sync Dispatcher

on:
  workflow_call:
    inputs:
      repo_name:
        required: true
        type: string
      pr_number:
        required: true
        type: string
      pr_title:
        required: true
        type: string
    secrets:
      BOT_TOKEN:
        required: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Auto-doc
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_TOKEN }}

      - name: Fetch PR diff
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          REPO: ${{ inputs.repo_name }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          curl -s \
            -H "Authorization: Bearer $BOT_TOKEN" \
            -H "Accept: application/vnd.github.v3.diff" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER" \
            > diff.txt
          echo "Diff fetched. Lines: $(wc -l < diff.txt)"

      - name: Build metadata.json
        env:
          REPO: ${{ inputs.repo_name }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PR_TITLE: ${{ inputs.pr_title }}
        run: |
          python3 - <<'EOF'
          import json, os

          data = {
              "repo":      os.environ["REPO"],
              "pr_number": os.environ["PR_NUMBER"],
              "pr_title":  os.environ["PR_TITLE"],
              "diff":      open("diff.txt").read(),
          }

          with open("metadata.json", "w") as f:
              json.dump(data, f)

          print("=== metadata.json preview ===")
          print("repo:",                data["repo"])
          print("pr_number:",           data["pr_number"])
          print("pr_title:",            data["pr_title"])
          print("diff length (chars):", len(data["diff"]))
          EOF

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run change analyzer
        run: python3 -m analyzer.main

      - name: Print change payload
        run: |
          if [ -f change_payload.json ]; then
            cat change_payload.json
          else
            echo "No documentation-relevant changes detected."
          fi
